<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NewGen | Dezvoltator</title>
<style>
:root{--green:#8dcb39;--blue:#253550;--dark:#1a2538;--grey:#bdc2ca;--black:#282828}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--dark);color:#fff}a{text-decoration:none;color:inherit}
.wrap{width:min(1180px,calc(100% - 48px));margin:auto}.page{min-height:100vh;display:grid;grid-template-columns:1fr .85fr;align-items:center;gap:70px;padding:48px 0}.back{display:inline-flex;margin-bottom:54px;color:rgba(255,255,255,.7);font-size:14px;font-weight:800}.mark{color:var(--green);font-size:34px}h1{font-size:clamp(44px,6vw,68px);line-height:1.05;letter-spacing:0;margin:20px 0;color:#fff}.lead{max-width:560px;color:rgba(255,255,255,.65);font-size:18px;line-height:1.7}
form{background:#fff;color:var(--black);border-radius:8px;padding:34px;box-shadow:0 28px 90px rgba(0,0,0,.25)}.eyebrow{color:var(--green);font-size:13px;font-weight:900;letter-spacing:.18em;text-transform:uppercase}h2{margin:8px 0 28px;color:var(--blue);font-size:32px}label{display:grid;gap:8px;margin-top:17px;color:var(--blue);font-size:14px;font-weight:800}input{height:48px;border:1px solid rgba(189,194,202,.7);border-radius:6px;padding:0 14px;font:inherit;outline:none}input:focus{border-color:var(--blue)}button{width:100%;height:48px;margin-top:25px;border:0;border-radius:6px;background:var(--blue);color:#fff;font:inherit;font-weight:900;cursor:pointer}button:disabled{opacity:.6}.notice{display:none;margin-top:16px;padding:13px;border-radius:6px;background:#fff0f0;color:#a32929;font-size:14px;font-weight:800}.notice.show{display:block}
@media(max-width:820px){.wrap{width:min(100% - 32px,1180px)}.page{grid-template-columns:1fr;gap:32px;padding:28px 0}.back{margin-bottom:30px}form{padding:25px}}
</style>
</head>
<body>
<main class="wrap page">
<section><a class="back" href="/">&#8592; Inapoi la prezentare</a><div class="mark">&#9638;</div><h1>Panoul dezvoltatorului.</h1><p class="lead">Gestioneaza clientii si locuintele atribuite dintr-un singur loc.</p></section>
<form id="developerLogin"><div class="eyebrow">Administrare</div><h2>Cont dezvoltator</h2><label>Email<input name="email" type="email" required></label><label>Parola<input name="password" type="password" required></label><button type="submit">Intra in panou</button><div class="notice" id="notice"></div></form>
</main>
<script>
const form=document.getElementById("developerLogin"),notice=document.getElementById("notice");
form.addEventListener("submit",async event=>{event.preventDefault();const button=form.querySelector("button"),original=button.textContent;button.disabled=true;button.textContent="Se verifica...";notice.className="notice";try{const response=await fetch("/api/developer-login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(Object.fromEntries(new FormData(form).entries()))});const data=await response.json();if(!response.ok)throw new Error(data.message||"Autentificarea nu a reusit.");window.location.href="/panou-dezvoltator.html"}catch(error){notice.textContent=error.message;notice.className="notice show";button.disabled=false;button.textContent=original}});
</script>
</body>
</html>

<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NewGen | Contul meu</title>
  <style>
    :root{--green:#8dcb39;--blue:#253550;--dark:#1a2538;--grey:#bdc2ca;--black:#282828}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--dark);color:#fff}
    a{text-decoration:none;color:inherit}.wrap{width:min(1160px,calc(100% - 48px));margin:0 auto}header{height:82px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.14)}
    .brand{font-size:21px;font-weight:950}.portal{font-size:13px;font-weight:800;color:rgba(255,255,255,.58)}main{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:64px;padding:72px 0}
    .eyebrow{color:var(--green);text-transform:uppercase;font-size:13px;font-weight:900;letter-spacing:.18em}h1{font-size:clamp(40px,6vw,64px);line-height:1.05;letter-spacing:0;margin:14px 0 18px}.intro{max-width:650px;color:rgba(255,255,255,.66);font-size:18px;line-height:1.7}
    .status{margin-top:42px;border-left:4px solid var(--green);background:#fff;color:var(--black);padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.18);display:flex;gap:18px}
    .icon{flex:0 0 46px;height:46px;border-radius:6px;display:grid;place-items:center;background:rgba(141,203,57,.16);color:var(--blue);font-size:21px}.small{color:var(--green);font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase}
    h2{color:var(--blue);font-size:26px;margin:8px 0}.status p{color:rgba(40,40,40,.68);font-size:16px;line-height:1.65;margin:0}.profile{border-left:1px solid rgba(255,255,255,.14);padding-left:34px}
    .profile h2{color:#fff;font-size:18px;margin:0 0 28px}.row{display:grid;grid-template-columns:22px 1fr;gap:12px;margin-bottom:24px}.row-icon{color:var(--green)}dt{font-size:12px;color:rgba(255,255,255,.42)}dd{margin:5px 0 0;font-size:14px;font-weight:800;overflow-wrap:anywhere}
    .loading,.error{padding:80px 0;text-align:center}.error a{display:inline-flex;margin-top:20px;background:var(--green);color:var(--dark);padding:12px 18px;border-radius:6px;font-weight:900}
    @media(max-width:800px){.wrap{width:min(100% - 32px,1160px)}main{grid-template-columns:1fr;gap:40px;padding:45px 0}.profile{border-left:0;border-top:1px solid rgba(255,255,255,.14);padding:30px 0 0}.status{padding:22px}}
  </style>
</head>
<body>
  <header class="wrap"><a class="brand" href="/">NEWGEN</a><span class="portal">Portal client</span></header>
  <div class="wrap" id="app"><div class="loading">Se incarca profilul...</div></div>
  <script>
    async function loadAccount() {
      const app = document.getElementById("app");
      try {
        const response = await fetch("/api/client-account");
        const data = await response.json();
        if (!response.ok || !data.account) throw new Error(data.message || "Sesiunea nu este activa.");
        const account = data.account;
        const firstName = account.name.split(" ")[0];
        app.innerHTML = '<main><section><div class="eyebrow">Contul meu</div><h1>Bine ai venit, '+escapeHtml(firstName)+'.</h1><p class="intro">Aici vei gasi informatiile despre locuinta ta si actualizarile transmise de dezvoltator.</p><div class="status"><div class="icon">&#8987;</div><div><div class="small">Status apartament</div><h2>'+(account.apartmentId ? 'Apartament asignat' : 'In asteptarea atribuirii')+'</h2><p>'+(account.apartmentId ? 'Dezvoltatorul ti-a asociat locuinta achizitionata.' : 'Contul tau este activ. Dezvoltatorul va atribui in curand apartamentul achizitionat.')+'</p></div></div></section><aside class="profile"><h2>Date personale</h2><dl><div class="row"><span class="row-icon">&#9679;</span><div><dt>Nume</dt><dd>'+escapeHtml(account.name)+'</dd></div></div><div class="row"><span class="row-icon">@</span><div><dt>Email</dt><dd>'+escapeHtml(account.email)+'</dd></div></div><div class="row"><span class="row-icon">&#9742;</span><div><dt>Telefon</dt><dd>'+escapeHtml(account.phone || "Necompletat")+'</dd></div></div></dl></aside></main>';
      } catch(error) {
        app.innerHTML = '<div class="error"><h1>Sesiunea nu este activa</h1><p>'+escapeHtml(error.message)+'</p><a href="/cont-client.html">Inapoi la inregistrare</a></div>';
      }
    }
    function escapeHtml(value){const div=document.createElement("div");div.textContent=value;return div.innerHTML}
    loadAccount();
  </script>
</body>
</html>
